name: Tests

on:
  pull_request:
  push:
    branches:
      - develop
      - master

jobs:
  phpunit:
    name: PHPUnit
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Install subversion
        run: sudo apt-get update && sudo apt-get install -y subversion

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
          coverage: none

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v3

      - name: Install WordPress test suite
        run: bash bin/install-wp-tests.sh wordpress_test root '' 127.0.0.1 latest

      - name: Run PHPUnit
        run: vendor/bin/phpunit

  build-freshness:
    name: Build freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build block editor assets
        run: npm run build

      - name: Verify committed build is up to date
        run: git diff --exit-code -- admin/js/block-editor/build/

  playwright:
    name: Playwright e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build block editor assets
        # The e2e suite asserts against the Block Editor bundle; CI checks
        # out fresh so we have to build before booting wp-env.
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start wp-env
        run: npm run env:start

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Stop wp-env
        if: always()
        run: npm run env:stop
